{% extends "base.html" %}

{% block content %}
    <div class="card login-card">
        <h2>个人中心</h2>
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
        {% if user %}
            <ul class="info-list">
                <li><strong>ID：</strong>{{ user["id"] }}</li>
                <li><strong>用户名：</strong>{{ user["username"] }}</li>
                <li><strong>邮箱：</strong>{{ user["email"] }}</li>
                <li><strong>手机号：</strong>{{ user["phone"] }}</li>
                <li><strong>余额：</strong>{{ user["balance"] }} 元</li>
            </ul>

            <h3 style="margin-top: 25px;">充值</h3>
            <form method="post" action="/recharge" class="login-form">
                <input type="hidden" name="user_id" value="{{ user['id'] }}">
                <div class="form-group">
                    <label for="amount">充值金额</label>
                    <input type="number" id="amount" name="amount" placeholder="请输入金额" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">充值</button>
            </form>
        {% endif %}
    </div>
{% endblock %}
